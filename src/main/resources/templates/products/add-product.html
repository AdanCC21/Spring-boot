<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/index.css}" />
    <link rel="stylesheet" th:href="@{/css/product/formluario.css}" />
    <title>Document</title>
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="form-container">
        <div class="form-header">
            <h2>Registrar Artículo</h2>
            <p>Completa los campos para publicar un nuevo producto en venta</p>
        </div>

        <form id="public-product-form" class="product-form">
            <div class="form-group">
                <label for="title">Título del artículo</label>
                <input type="text" id="title" name="title" placeholder="Ej. Tenis para Correr Run 5.0" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="brand">Marca</label>
                    <input type="text" id="brand" name="brand" placeholder="Ej. Nike" required>
                </div>

                <div class="form-group">
                    <label for="price">Precio ($)</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" placeholder="0.00" required>
                </div>
            </div>

            <div class="form-group">
                <label for="image">Enlace de la imagen <span class="optional-badge">(Opcional)</span></label>
                <input type="url" id="image" name="image" placeholder="https://ejemplo.com/imagen.jpg">
                <small class="helper-text">Inserta una URL válida que apunte directamente a la imagen (jpg,
                    png).</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Guardar Artículo</button>
                <a th:href="@{/productos}" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>

    <script type="module" th:src="@{/js/product/create.js}" defer></script>
</body>

</html>
