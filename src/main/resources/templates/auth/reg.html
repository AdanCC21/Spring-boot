<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/index.css}" />
    <link rel="stylesheet" th:href="@{/css/auth/register.css}" />
    <title>Crear Cuenta</title>
</head>

<body>

    <div class="register-container">
        <div class="register-header">
            <h2>Crea tu cuenta</h2>
            <p>Regístrate para comenzar a usar la plataforma</p>
        </div>

        <span id="error-msg"></span>

        <form id="reg-form">
            <!-- Fila de Nombre y Apellido -->
            <div class="form-row">
                <div class="input-group">
                    <label for="firstname">Nombre</label>
                    <input type="text" id="name" name="name" placeholder="Juan" required>
                </div>
            </div>

            <!-- Input de Correo -->
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <!-- Input de Contraseña -->
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <!-- Input de Confirmar Contraseña -->
            <div class="input-group">
                <label for="confirm-password">Confirmar contraseña</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Repite tu contraseña"
                    required>
            </div>

            <!-- Checkbox de Términos -->
            <div class="terms-option">
                <label>
                    <input type="checkbox" name="terms" required> Acepto los <a href="#">Términos y Condiciones</a>
                </label>
            </div>

            <!-- Botón de Enviar -->
            <button class="register-btn" id="send-form">Registrarse</button>
        </form>

        <!-- Volver al Login -->
        <div class="login-link">
            ¿Ya tienes una cuenta? <a href="/auth">Inicia sesión aquí</a>
        </div>
    </div>

    <script th:src="@{/js/auth.js}" type="module"></script>
</body>

</html>
